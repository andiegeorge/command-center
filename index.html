<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andie's To-Dos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f0ede8;
      color: #1c1c1c;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 20px;
    }

    .container { width: 100%; max-width: 600px; }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 28px;
    }

    /* ── Add bar ── */
    .add-bar {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .add-main {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      gap: 8px;
    }

    input.headline-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      color: #1c1c1c;
      outline: none;
      font-family: inherit;
    }

    input.headline-input::placeholder { color: #c0bdb8; }

    button.details-toggle {
      background: none;
      border: 1px solid #e2e0db;
      color: #aaa;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: inherit;
    }

    button.details-toggle:hover { border-color: #bbb; color: #666; }
    button.details-toggle.active { border-color: #bbb; color: #555; background: #f7f6f3; }

    button.add-btn {
      background: #1c1c1c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }

    button.add-btn:hover { background: #333; }

    .add-details {
      border-top: 1px solid #f0ede8;
      padding: 12px;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .add-details.open { display: grid; }
    .add-details .full { grid-column: 1 / -1; }

    .field-label {
      display: block;
      font-size: 0.67rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 4px;
    }

    .add-details input,
    .add-details select,
    .add-details textarea {
      width: 100%;
      background: #f7f6f3;
      border: 1px solid #e2e0db;
      border-radius: 6px;
      color: #1c1c1c;
      font-size: 0.88rem;
      font-family: inherit;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-details input[type="date"] { color-scheme: light; }
    .add-details input:focus,
    .add-details select:focus,
    .add-details textarea:focus { border-color: #bbb; background: #fff; }
    .add-details textarea { resize: vertical; min-height: 60px; }

    /* ── Task list ── */
    ul.task-list { list-style: none; }

    li.task-item {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      margin-bottom: 6px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }

    li.task-item:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

    .task-main {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .check-btn {
      width: 18px;
      height: 18px;
      border: 1.5px solid #d4d0c8;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      background: none;
      padding: 0;
      transition: border-color 0.15s;
    }

    .check-btn:hover { border-color: #888; }

    .priority-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .priority-dot[data-p="urgent"] { background: #d94f4f; }
    .priority-dot[data-p="high"]   { background: #e8854a; }
    .priority-dot[data-p="medium"] { background: #d4cfc6; }
    .priority-dot[data-p="low"]    { background: #e2e0db; }

    .task-text {
      flex: 1;
      font-size: 0.93rem;
      line-height: 1.4;
      color: #1c1c1c;
    }

    .due-chip {
      font-size: 0.73rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: #f0ede8;
      color: #999;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .due-chip.overdue { background: #fde8e8; color: #c0392b; }
    .due-chip.today   { background: #e8f4e8; color: #2d7a2d; }

    .chevron {
      font-size: 0.8rem;
      color: #d4d0c8;
      flex-shrink: 0;
      transition: transform 0.18s;
      line-height: 1;
    }

    li.task-item.expanded .chevron { transform: rotate(90deg); }

    .task-detail {
      display: none;
      padding: 0 14px 12px;
    }

    li.task-item.expanded .task-detail { display: block; }

    .detail-divider {
      border: none;
      border-top: 1px solid #f0ede8;
      margin-bottom: 10px;
    }

    .detail-row {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      font-size: 0.84rem;
    }

    .d-label {
      color: #c0bdb8;
      width: 68px;
      flex-shrink: 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-top: 2px;
    }

    .d-value { color: #555; line-height: 1.4; }

    .task-actions { margin-top: 10px; }

    button.del-btn {
      background: none;
      border: 1px solid #e2e0db;
      color: #c0bdb8;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    button.del-btn:hover { border-color: #e55; color: #e55; }

    /* ── Recurring active (in main list) ── */
    li.rec-item {
      background: #faf9f7;
      border: 1px solid #e8e5df;
      border-radius: 10px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .rec-main {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
    }

    .rec-circle {
      width: 18px;
      height: 18px;
      border: 1.5px solid #d4d0c8;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .rec-circle:hover { border-color: #888; }

    .rec-icon { font-size: 0.72rem; color: #d4d0c8; flex-shrink: 0; }

    .tag {
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .tag-due  { background: #fde8e8; color: #c0392b; }
    .tag-soon { background: #f7f5f0; color: #aaa; }

    .rec-complete-form {
      border-top: 1px solid #f0ede8;
      padding: 12px 14px;
      display: none;
      background: #f7f6f3;
    }

    .rec-complete-form.open { display: block; }

    .cf-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .cf-grid input[type="date"] {
      width: 100%;
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 6px;
      color: #1c1c1c;
      font-size: 0.83rem;
      padding: 6px 10px;
      outline: none;
      color-scheme: light;
      font-family: inherit;
    }

    /* ── Recurring section (templates) ── */
    .section-divider {
      border: none;
      border-top: 1px solid #e2e0db;
      margin: 32px 0 22px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-label {
      font-size: 0.67rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c0bdb8;
    }

    button.sm-btn {
      background: none;
      border: 1px solid #e2e0db;
      color: #bbb;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 3px 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    button.sm-btn:hover { border-color: #aaa; color: #666; }

    .add-rec-form {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      display: none;
    }

    .add-rec-form.open { display: block; }
    .add-rec-form .add-main { padding: 0 0 12px; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .two-col input[type="date"] {
      width: 100%;
      background: #f7f6f3;
      border: 1px solid #e2e0db;
      border-radius: 6px;
      color: #1c1c1c;
      font-size: 0.88rem;
      padding: 7px 10px;
      outline: none;
      color-scheme: light;
      font-family: inherit;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button.save-btn {
      background: #1c1c1c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 7px 16px;
      cursor: pointer;
      font-family: inherit;
    }

    button.save-btn:hover { background: #333; }

    button.cancel-btn {
      background: none;
      border: 1px solid #e2e0db;
      color: #aaa;
      border-radius: 6px;
      font-size: 0.85rem;
      padding: 7px 14px;
      cursor: pointer;
      font-family: inherit;
    }

    button.cancel-btn:hover { border-color: #aaa; color: #666; }

    ul.rec-list { list-style: none; }

    li.template-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .rec-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-active  { background: #7bbf7b; }
    .dot-snoozed { background: #d4d0c8; }
    .dot-due     { background: #e8854a; }

    .t-text { flex: 1; font-size: 0.88rem; color: #666; }

    .t-meta { font-size: 0.73rem; color: #c0bdb8; white-space: nowrap; }
    .t-meta .m-active { color: #7bbf7b; }
    .t-meta .m-due    { color: #e8854a; }

    button.x-btn {
      background: none;
      border: none;
      color: #ddd;
      font-size: 1rem;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.15s;
    }

    button.x-btn:hover { color: #e55; }

    .empty-msg { font-size: 0.88rem; color: #ccc; padding: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do</h1>

    <div class="add-bar">
      <div class="add-main">
        <input class="headline-input" id="new-todo" type="text" placeholder="Add a task…" autocomplete="off" />
        <button class="details-toggle" id="details-toggle" onclick="toggleDetails()">+ details</button>
        <button class="add-btn" onclick="addTodo()">Add</button>
      </div>
      <div class="add-details" id="add-details">
        <div>
          <span class="field-label">Priority</span>
          <select id="new-priority">
            <option value="medium">Medium</option>
            <option value="urgent">Urgent</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div>
          <span class="field-label">Due date</span>
          <input type="date" id="new-due" />
        </div>
        <div>
          <span class="field-label">Category</span>
          <input type="text" id="new-category" placeholder="e.g. Work, Learning…" />
        </div>
        <div class="full">
          <span class="field-label">Context / notes</span>
          <textarea id="new-context" placeholder="Any extra detail…"></textarea>
        </div>
      </div>
    </div>

    <ul class="task-list" id="active-list"></ul>

    <hr class="section-divider" />

    <div class="section-header">
      <span class="section-label">Recurring</span>
      <button class="sm-btn" onclick="toggleAddRec()">+ Add</button>
    </div>

    <div class="add-rec-form" id="add-rec-form">
      <div class="add-main">
        <input class="headline-input" id="new-rec-text" type="text" placeholder="Task name…" autocomplete="off" />
      </div>
      <div class="two-col">
        <div>
          <span class="field-label">Snooze until</span>
          <input type="date" id="new-rec-snooze" />
        </div>
        <div>
          <span class="field-label">Must do by</span>
          <input type="date" id="new-rec-mustdo" />
        </div>
      </div>
      <div class="form-actions">
        <button class="cancel-btn" onclick="toggleAddRec()">Cancel</button>
        <button class="save-btn" onclick="addRecurring()">Add</button>
      </div>
    </div>

    <ul class="rec-list" id="recurring-list"></ul>
  </div>

  <script>
    const KEY = 'andie-todos-v2';

    function load() {
      try {
        const d = JSON.parse(localStorage.getItem(KEY));
        return (d && Array.isArray(d.todos)) ? d : { todos: [], recurring: [] };
      } catch { return { todos: [], recurring: [] }; }
    }

    function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

    function today() { return new Date().toISOString().slice(0, 10); }

    function addDays(n, from) {
      const d = new Date((from || today()) + 'T00:00:00');
      d.setDate(d.getDate() + n);
      return d.toISOString().slice(0, 10);
    }

    function fmt(s) {
      if (!s) return '';
      return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtDue(s) {
      if (!s) return null;
      const t = today();
      if (s < t) return { label: 'Overdue', cls: 'overdue' };
      if (s === t) return { label: 'Today', cls: 'today' };
      const d = new Date(s + 'T00:00:00');
      const diff = Math.round((d - new Date(t + 'T00:00:00')) / 86400000);
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      if (diff === 1) return { label: 'Tomorrow', cls: '' };
      if (diff <= 6) return { label: days[d.getDay()], cls: '' };
      return { label: fmt(s), cls: '' };
    }

    function isActive(r) { return !r.snoozeUntil || r.snoozeUntil <= today(); }
    function isDue(r)    { return r.mustDoBy && r.mustDoBy <= today(); }
    function isSoon(r)   { return r.mustDoBy && r.mustDoBy > today() && addDays(3) >= r.mustDoBy; }

    // ── Render ───────────────────────────────────────────

    function render() {
      renderActive();
      renderRecurringList();
    }

    function renderActive() {
      const { todos, recurring } = load();
      const list = document.getElementById('active-list');
      list.innerHTML = '';

      const activeTodos = todos.filter(t => !t.done);
      const activeRec   = recurring.filter(isActive);

      if (!activeTodos.length && !activeRec.length) {
        const msg = document.createElement('p');
        msg.className = 'empty-msg';
        msg.textContent = 'Nothing here yet.';
        list.appendChild(msg);
        return;
      }

      activeTodos.forEach(t => list.appendChild(makeTodoItem(t)));
      activeRec.forEach(r   => list.appendChild(makeRecItem(r)));
    }

    function renderRecurringList() {
      const { recurring } = load();
      const list = document.getElementById('recurring-list');
      list.innerHTML = '';

      if (!recurring.length) {
        const msg = document.createElement('p');
        msg.className = 'empty-msg';
        msg.textContent = 'No recurring tasks yet.';
        list.appendChild(msg);
        return;
      }

      recurring.forEach(r => list.appendChild(makeTemplateItem(r)));
    }

    // ── Item builders ────────────────────────────────────

    function makeTodoItem(todo) {
      const li = document.createElement('li');
      li.className = 'task-item';

      const main = document.createElement('div');
      main.className = 'task-main';
      main.onclick = () => li.classList.toggle('expanded');

      const check = document.createElement('button');
      check.className = 'check-btn';
      check.title = 'Complete';
      check.onclick = e => { e.stopPropagation(); removeTodo(todo.id); };

      const dot = document.createElement('span');
      dot.className = 'priority-dot';
      dot.dataset.p = todo.priority || 'medium';

      const text = document.createElement('span');
      text.className = 'task-text';
      text.textContent = todo.text;

      main.append(check, dot, text);

      if (todo.due) {
        const due = fmtDue(todo.due);
        if (due) {
          const chip = document.createElement('span');
          chip.className = 'due-chip' + (due.cls ? ' ' + due.cls : '');
          chip.textContent = due.label;
          main.append(chip);
        }
      }

      const chevron = document.createElement('span');
      chevron.className = 'chevron';
      chevron.textContent = '›';
      main.append(chevron);

      const detail = document.createElement('div');
      detail.className = 'task-detail';

      const hr = document.createElement('hr');
      hr.className = 'detail-divider';
      detail.append(hr);

      const rows = [];
      if (todo.priority) rows.push(['Priority', todo.priority[0].toUpperCase() + todo.priority.slice(1)]);
      if (todo.due)      rows.push(['Due', fmt(todo.due)]);
      if (todo.category) rows.push(['Category', todo.category]);
      if (todo.context)  rows.push(['Context', todo.context]);

      rows.forEach(([label, value]) => {
        const row = document.createElement('div');
        row.className = 'detail-row';
        row.innerHTML = `<span class="d-label">${label}</span><span class="d-value">${value}</span>`;
        detail.append(row);
      });

      const actions = document.createElement('div');
      actions.className = 'task-actions';
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = 'Delete';
      del.onclick = () => removeTodo(todo.id);
      actions.append(del);
      detail.append(actions);

      li.append(main, detail);
      return li;
    }

    function makeRecItem(r) {
      const li = document.createElement('li');
      li.className = 'rec-item';

      const main = document.createElement('div');
      main.className = 'rec-main';

      const circle = document.createElement('div');
      circle.className = 'rec-circle';
      circle.title = 'Mark done…';
      circle.onclick = () => form.classList.toggle('open');

      const text = document.createElement('span');
      text.className = 'task-text';
      text.textContent = r.text;

      const icon = document.createElement('span');
      icon.className = 'rec-icon';
      icon.textContent = '↻';

      main.append(circle, text, icon);

      if (isDue(r)) {
        const tag = document.createElement('span');
        tag.className = 'tag tag-due';
        tag.textContent = 'due ' + fmt(r.mustDoBy);
        main.append(tag);
      } else if (isSoon(r)) {
        const tag = document.createElement('span');
        tag.className = 'tag tag-soon';
        tag.textContent = 'by ' + fmt(r.mustDoBy);
        main.append(tag);
      }

      const form = makeCompleteForm(r.id);
      li.append(main, form);
      return li;
    }

    function makeCompleteForm(id) {
      const div = document.createElement('div');
      div.className = 'rec-complete-form';
      const t = today();
      div.innerHTML = `
        <div class="cf-grid">
          <div><span class="field-label">Completed on</span><input type="date" id="cf-done-${id}" value="${t}" max="${t}" /></div>
          <div><span class="field-label">Snooze until</span><input type="date" id="cf-snooze-${id}" value="${addDays(7)}" /></div>
          <div><span class="field-label">Must do by</span><input type="date" id="cf-mustdo-${id}" value="${addDays(10)}" /></div>
        </div>
        <div class="form-actions">
          <button class="cancel-btn" onclick="this.closest('.rec-complete-form').classList.remove('open')">Cancel</button>
          <button class="save-btn" onclick="saveCompletion(${id})">Save</button>
        </div>`;
      return div;
    }

    function makeTemplateItem(r) {
      const li = document.createElement('li');
      li.className = 'template-item';

      const dot = document.createElement('span');
      dot.className = 'rec-dot ' + (isDue(r) ? 'dot-due' : isActive(r) ? 'dot-active' : 'dot-snoozed');

      const text = document.createElement('span');
      text.className = 't-text';
      text.textContent = r.text;

      const meta = document.createElement('span');
      meta.className = 't-meta';
      if (isDue(r)) {
        meta.innerHTML = `<span class="m-due">due ${fmt(r.mustDoBy)}</span>`;
      } else if (isActive(r)) {
        meta.innerHTML = `<span class="m-active">active</span>` + (r.mustDoBy ? ` · by ${fmt(r.mustDoBy)}` : '');
      } else {
        meta.textContent = `back ${fmt(r.snoozeUntil)}` + (r.mustDoBy ? ` · by ${fmt(r.mustDoBy)}` : '');
      }

      const del = document.createElement('button');
      del.className = 'x-btn';
      del.textContent = '×';
      del.onclick = () => removeRecurring(r.id);

      li.append(dot, text, meta, del);
      return li;
    }

    // ── Actions ─────────────────────────────────────────

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      const data = load();
      data.todos.unshift({
        id: Date.now(), text, done: false,
        priority: document.getElementById('new-priority').value,
        due:      document.getElementById('new-due').value || null,
        category: document.getElementById('new-category').value.trim() || null,
        context:  document.getElementById('new-context').value.trim() || null,
      });
      save(data);
      input.value = '';
      document.getElementById('new-due').value = '';
      document.getElementById('new-category').value = '';
      document.getElementById('new-context').value = '';
      document.getElementById('new-priority').value = 'medium';
      document.getElementById('add-details').classList.remove('open');
      document.getElementById('details-toggle').classList.remove('active');
      render();
    }

    function removeTodo(id) {
      const data = load();
      data.todos = data.todos.filter(t => t.id !== id);
      save(data);
      render();
    }

    function toggleDetails() {
      document.getElementById('add-details').classList.toggle('open');
      document.getElementById('details-toggle').classList.toggle('active');
    }

    function toggleAddRec() {
      const form = document.getElementById('add-rec-form');
      form.classList.toggle('open');
      if (form.classList.contains('open')) document.getElementById('new-rec-text').focus();
    }

    function addRecurring() {
      const text = document.getElementById('new-rec-text').value.trim();
      if (!text) return;
      const data = load();
      data.recurring.push({
        id: Date.now(), text, lastCompleted: null,
        snoozeUntil: document.getElementById('new-rec-snooze').value || null,
        mustDoBy:    document.getElementById('new-rec-mustdo').value || null,
      });
      save(data);
      document.getElementById('new-rec-text').value = '';
      document.getElementById('new-rec-snooze').value = '';
      document.getElementById('new-rec-mustdo').value = '';
      document.getElementById('add-rec-form').classList.remove('open');
      render();
    }

    function saveCompletion(id) {
      const data = load();
      const r = data.recurring.find(x => x.id === id);
      if (r) {
        r.lastCompleted = document.getElementById('cf-done-' + id)?.value || today();
        r.snoozeUntil   = document.getElementById('cf-snooze-' + id)?.value || null;
        r.mustDoBy      = document.getElementById('cf-mustdo-' + id)?.value || null;
      }
      save(data);
      render();
    }

    function removeRecurring(id) {
      const data = load();
      data.recurring = data.recurring.filter(r => r.id !== id);
      save(data);
      render();
    }

    // ── Seed ────────────────────────────────────────────

    function seedIfNeeded() {
      const data = load();
      if (data.seeded) return;
      const now = Date.now();
      [
        'Wed EOD (hard): VIP Slack workflow – solo brainstorm + build + test',
        'End of week: Mima – net zero + daily evals',
        'End of week: Coach – daily evals',
        'End of week: Darrell Younger hypothesis-check with Coco',
      ].forEach((text, i) => data.todos.push({ id: now + i, text, done: false, priority: 'medium', due: null, category: null, context: null }));
      [
        'GitHub – primer → Q&A conversation → quiz (concepts, workflows, spot gaps, eventually contribute to structure)',
        'DBT & DBT modeling – same learning arc (prove you can hang with analytical engineering without becoming one)',
        'AI infrastructure & service account value prop – where things are hosted, strands, local vs shared, how GitHub fits in, why Snowflake service account matters',
        "Ops OS literacy (Matt Hardy & Annie's build)",
        'Claude managed agents & Claude tag',
        'Command center in Claude Code – build + refine',
      ].forEach((text, i) => data.recurring.push({ id: now + 100 + i, text, snoozeUntil: null, mustDoBy: null, lastCompleted: null }));
      data.seeded = true;
      save(data);
    }

    // ── Init ────────────────────────────────────────────

    document.getElementById('new-todo').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
    document.getElementById('new-rec-text').addEventListener('keydown', e => { if (e.key === 'Enter') addRecurring(); });

    seedIfNeeded();
    render();
  </script>
</body>
</html>
