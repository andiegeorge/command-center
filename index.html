<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andie's To-Dos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f0ede8;
      color: #1c1c1c;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 20px;
    }

    .container { width: 100%; max-width: 600px; }

    /* ── Top bar + tabs ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.01em; }

    .tab-bar {
      display: flex;
      gap: 2px;
      background: #e4e1db;
      border-radius: 8px;
      padding: 3px;
    }

    .tab {
      background: none;
      border: none;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #aaa;
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tab.active { background: #fff; color: #1c1c1c; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

    /* ── Shared ── */
    .field-label {
      display: block;
      font-size: 0.67rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 4px;
    }

    .section-divider { border: none; border-top: 1px solid #e2e0db; margin: 32px 0 22px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-label {
      font-size: 0.67rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c0bdb8;
    }

    button.sm-btn {
      background: none;
      border: 1px solid #e2e0db;
      color: #bbb;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 3px 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    button.sm-btn:hover { border-color: #aaa; color: #666; }

    .form-actions { display: flex; gap: 8px; justify-content: flex-end; }

    button.save-btn {
      background: #1c1c1c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 7px 16px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    button.save-btn:hover { background: #333; }
    button.save-btn.saved { background: #7bbf7b; }

    button.cancel-btn {
      background: none;
      border: 1px solid #e2e0db;
      color: #aaa;
      border-radius: 6px;
      font-size: 0.85rem;
      padding: 7px 14px;
      cursor: pointer;
      font-family: inherit;
    }

    button.cancel-btn:hover { border-color: #aaa; color: #666; }

    button.del-btn {
      background: none;
      border: 1px solid #e2e0db;
      color: #c0bdb8;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    button.del-btn:hover { border-color: #e55; color: #e55; }

    button.x-btn {
      background: none;
      border: none;
      color: #ddd;
      font-size: 1rem;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.15s;
    }

    button.x-btn:hover { color: #e55; }

    .empty-msg { font-size: 0.88rem; color: #ccc; padding: 10px 0; }

    /* ── Add bar ── */
    .add-bar {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .add-main {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      gap: 8px;
    }

    input.headline-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      color: #1c1c1c;
      outline: none;
      font-family: inherit;
    }

    input.headline-input::placeholder { color: #c0bdb8; }

    button.details-toggle {
      background: none;
      border: 1px solid #e2e0db;
      color: #aaa;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: inherit;
    }

    button.details-toggle:hover { border-color: #bbb; color: #666; }
    button.details-toggle.active { border-color: #bbb; color: #555; background: #f7f6f3; }

    button.add-btn {
      background: #1c1c1c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }

    button.add-btn:hover { background: #333; }

    .add-details {
      border-top: 1px solid #f0ede8;
      padding: 12px;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .add-details.open { display: grid; }
    .add-details .full { grid-column: 1 / -1; }

    .add-details input,
    .add-details select,
    .add-details textarea {
      width: 100%;
      background: #f7f6f3;
      border: 1px solid #e2e0db;
      border-radius: 6px;
      color: #1c1c1c;
      font-size: 0.88rem;
      font-family: inherit;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-details input[type="date"] { color-scheme: light; }
    .add-details input:focus,
    .add-details select:focus,
    .add-details textarea:focus { border-color: #bbb; background: #fff; }
    .add-details textarea { resize: vertical; min-height: 60px; }

    /* ── Task list ── */
    ul.task-list { list-style: none; }

    li.task-item {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      margin-bottom: 6px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }

    li.task-item:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

    .task-main {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .check-btn {
      width: 18px;
      height: 18px;
      border: 1.5px solid #d4d0c8;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      background: none;
      padding: 0;
      transition: border-color 0.15s, background 0.15s;
    }

    .check-btn:hover { border-color: #7bbf7b; background: #f0faf0; }

    .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .priority-dot[data-p="urgent"] { background: #d94f4f; }
    .priority-dot[data-p="high"]   { background: #e8854a; }
    .priority-dot[data-p="medium"] { background: #d4cfc6; }
    .priority-dot[data-p="low"]    { background: #e2e0db; }

    .task-text { flex: 1; font-size: 0.93rem; line-height: 1.4; color: #1c1c1c; }

    .due-chip {
      font-size: 0.73rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: #f0ede8;
      color: #999;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .due-chip.overdue { background: #fde8e8; color: #c0392b; }
    .due-chip.today   { background: #e8f4e8; color: #2d7a2d; }

    .chevron {
      font-size: 0.8rem;
      color: #d4d0c8;
      flex-shrink: 0;
      transition: transform 0.18s;
      line-height: 1;
    }

    li.task-item.expanded .chevron { transform: rotate(90deg); }

    .task-detail { display: none; padding: 0 14px 12px; }
    li.task-item.expanded .task-detail { display: block; }

    .detail-divider { border: none; border-top: 1px solid #f0ede8; margin-bottom: 10px; }

    .detail-row { display: flex; gap: 12px; padding: 4px 0; font-size: 0.84rem; }

    .d-label {
      color: #c0bdb8;
      width: 68px;
      flex-shrink: 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-top: 2px;
    }

    .d-value { color: #555; line-height: 1.4; }

    .task-actions { display: flex; gap: 8px; margin-top: 10px; }

    /* ── Edit form (inline task editing) ── */
    .edit-form { padding: 12px 14px; }
    .edit-form input, .edit-form select, .edit-form textarea {
      width: 100%;
      background: #f7f6f3;
      border: 1px solid #e2e0db;
      border-radius: 6px;
      color: #1c1c1c;
      font-size: 0.88rem;
      font-family: inherit;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }
    .edit-form input:focus, .edit-form select:focus, .edit-form textarea:focus { border-color: #bbb; background: #fff; }
    .edit-form .edit-headline { font-size: 0.93rem; }
    .edit-form input[type="date"] { color-scheme: light; }
    .edit-form textarea { resize: vertical; min-height: 56px; }
    .edit-form .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .edit-form .edit-grid > div input, .edit-form .edit-grid > div select { margin-bottom: 0; }

    /* ── Recurring items ── */
    li.rec-item {
      background: #faf9f7;
      border: 1px solid #e8e5df;
      border-radius: 10px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .rec-main { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }

    .rec-circle {
      width: 18px;
      height: 18px;
      border: 1.5px solid #d4d0c8;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .rec-circle:hover { border-color: #888; }
    .rec-icon { font-size: 0.72rem; color: #d4d0c8; flex-shrink: 0; }

    .tag { font-size: 0.72rem; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
    .tag-due  { background: #fde8e8; color: #c0392b; }
    .tag-soon { background: #f7f5f0; color: #aaa; }

    .rec-complete-form {
      border-top: 1px solid #f0ede8;
      padding: 12px 14px;
      display: none;
      background: #f7f6f3;
    }

    .rec-complete-form.open { display: block; }

    .cf-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

    .cf-grid input[type="date"] {
      width: 100%;
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 6px;
      color: #1c1c1c;
      font-size: 0.83rem;
      padding: 6px 10px;
      outline: none;
      color-scheme: light;
      font-family: inherit;
    }

    ul.rec-list { list-style: none; }

    li.template-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .rec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-active  { background: #7bbf7b; }
    .dot-snoozed { background: #d4d0c8; }
    .dot-due     { background: #e8854a; }

    .t-text { flex: 1; font-size: 0.88rem; color: #666; }
    .t-meta { font-size: 0.73rem; color: #c0bdb8; white-space: nowrap; }
    .t-meta .m-active { color: #7bbf7b; }
    .t-meta .m-due    { color: #e8854a; }

    .add-rec-form {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      display: none;
    }

    .add-rec-form.open { display: block; }
    .add-rec-form .add-main { padding: 0 0 12px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

    .two-col input[type="date"] {
      width: 100%;
      background: #f7f6f3;
      border: 1px solid #e2e0db;
      border-radius: 6px;
      color: #1c1c1c;
      font-size: 0.88rem;
      padding: 7px 10px;
      outline: none;
      color-scheme: light;
      font-family: inherit;
    }

    /* ── Wrap-up ── */
    .completed-count-msg { font-size: 0.83rem; color: #aaa; margin-bottom: 14px; }

    .mood-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

    .mood-btn {
      background: #f7f6f3;
      border: 1px solid #e2e0db;
      border-radius: 20px;
      font-size: 0.82rem;
      color: #888;
      padding: 5px 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .mood-btn:hover { border-color: #bbb; color: #444; }
    .mood-btn.selected { background: #1c1c1c; border-color: #1c1c1c; color: #fff; }

    #recap-input {
      width: 100%;
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 8px;
      color: #1c1c1c;
      font-size: 0.88rem;
      font-family: inherit;
      padding: 10px 12px;
      outline: none;
      resize: vertical;
      min-height: 72px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }

    #recap-input:focus { border-color: #bbb; }
    #recap-input::placeholder { color: #c0bdb8; }

    /* ── History ── */
    .log-entry {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .log-date { font-size: 0.88rem; font-weight: 500; color: #1c1c1c; }

    .log-mood {
      font-size: 0.73rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 12px;
    }

    .mood-crushed { background: #e8f7e8; color: #2d7a2d; }
    .mood-solid   { background: #e8f0fe; color: #2563eb; }
    .mood-mixed   { background: #fef7e0; color: #92600a; }
    .mood-behind  { background: #fff0e8; color: #b84a1a; }
    .mood-rough   { background: #fde8e8; color: #c0392b; }

    .log-recap { font-size: 0.85rem; color: #666; line-height: 1.5; margin-bottom: 10px; }

    .log-tasks { display: flex; flex-direction: column; gap: 4px; }

    .log-task {
      display: flex;
      align-items: baseline;
      gap: 7px;
      font-size: 0.82rem;
      color: #aaa;
    }

    .log-task::before { content: '✓'; font-size: 0.72rem; color: #bbb; flex-shrink: 0; }
    .log-no-tasks { font-size: 0.82rem; color: #d4d0c8; }

    /* ── Learn tab ── */
    .learn-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .learn-filters { display: flex; gap: 6px; }

    .topic-card {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }

    .topic-card:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .topic-card.mastered { opacity: 0.55; }

    .topic-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      cursor: pointer;
      user-select: none;
    }

    .topic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .topic-dot.active   { background: #7bbf7b; }
    .topic-dot.mastered { background: #d4d0c8; }

    .topic-title { flex: 1; font-size: 0.93rem; font-weight: 500; color: #1c1c1c; }
    .topic-card.mastered .topic-title { color: #aaa; }

    .topic-touched { font-size: 0.73rem; color: #c0bdb8; flex-shrink: 0; }

    .topic-chevron {
      font-size: 0.8rem;
      color: #d4d0c8;
      flex-shrink: 0;
      transition: transform 0.18s;
      line-height: 1;
    }

    .topic-card.expanded .topic-chevron { transform: rotate(90deg); }

    .topic-body { display: none; }
    .topic-card.expanded .topic-body { display: block; }

    .topic-desc {
      font-size: 0.84rem;
      color: #888;
      line-height: 1.5;
      padding: 0 14px 14px;
      border-bottom: 1px solid #f0ede8;
    }

    .learn-section { padding: 12px 14px; border-bottom: 1px solid #f0ede8; }
    .learn-section:last-child { border-bottom: none; }

    .learn-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .learn-section-label {
      font-size: 0.67rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c0bdb8;
    }

    /* Notes */
    .note-item {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #f7f6f3;
      align-items: flex-start;
    }

    .note-item:last-child { border-bottom: none; }

    .note-date {
      font-size: 0.72rem;
      color: #c0bdb8;
      flex-shrink: 0;
      width: 52px;
      padding-top: 2px;
    }

    .note-text { flex: 1; font-size: 0.85rem; color: #555; line-height: 1.5; }

    .add-note-form { display: none; margin-top: 8px; }
    .add-note-form.open { display: block; }

    .add-note-form textarea,
    .add-resource-form input,
    .add-topic-form input,
    .add-topic-form textarea {
      width: 100%;
      background: #f7f6f3;
      border: 1px solid #e2e0db;
      border-radius: 6px;
      color: #1c1c1c;
      font-size: 0.88rem;
      font-family: inherit;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 8px;
    }

    .add-note-form textarea:focus,
    .add-resource-form input:focus,
    .add-topic-form input:focus,
    .add-topic-form textarea:focus { border-color: #bbb; background: #fff; }

    .add-note-form textarea { resize: vertical; min-height: 64px; }
    .add-topic-form textarea { resize: vertical; min-height: 56px; }

    /* Resources */
    .resource-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #f7f6f3;
    }

    .resource-item:last-child { border-bottom: none; }

    .resource-link {
      flex: 1;
      font-size: 0.85rem;
      color: #2563eb;
      text-decoration: none;
    }

    .resource-link:hover { text-decoration: underline; }
    .resource-label { flex: 1; font-size: 0.85rem; color: #555; }

    .resource-note { font-size: 0.78rem; color: #aaa; margin-left: 4px; }

    .add-resource-form { display: none; margin-top: 8px; }
    .add-resource-form.open { display: block; }

    /* Add topic form */
    .add-topic-form {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .add-topic-form.open { display: block; }

    /* Topic footer actions */
    .topic-footer {
      padding: 10px 14px;
      display: flex;
      gap: 8px;
    }

    button.master-btn {
      background: none;
      border: 1px solid #e2e0db;
      color: #7bbf7b;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    button.master-btn:hover { background: #f0faf0; border-color: #7bbf7b; }
    button.unmaster-btn { color: #aaa; }
    button.unmaster-btn:hover { color: #888; background: #f7f6f3; border-color: #bbb; }

    /* ── Quote of the day ── */
    .quote-card {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .quote-text {
      font-size: 0.9rem;
      line-height: 1.65;
      color: #444;
      font-style: italic;
      margin-bottom: 8px;
    }

    .quote-attr {
      font-size: 0.75rem;
      color: #bbb;
      text-align: right;
      font-style: normal;
    }

    /* ── Morning focus card ── */
    .focus-card {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .focus-heading {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #bbb;
      margin-bottom: 10px;
    }

    .focus-question {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 10px;
    }

    .focus-set-items {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 8px;
    }

    .focus-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: #1c1c1c;
    }

    .focus-num {
      font-size: 0.75rem;
      font-weight: 700;
      color: #d4b06a;
      min-width: 14px;
    }

    .focus-edit-link {
      font-size: 0.75rem;
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .focus-edit-link:hover { color: #888; }

    .focus-inputs { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }

    .focus-inputs input {
      background: #f7f6f3;
      border: 1px solid #e2e0db;
      border-radius: 6px;
      color: #1c1c1c;
      font-size: 0.88rem;
      font-family: inherit;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .focus-inputs input:focus { border-color: #bbb; background: #fff; }

    /* ── Mood trend ── */
    .mood-trend-card {
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .trend-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #bbb;
      margin-bottom: 12px;
    }

    .mood-dots {
      display: flex;
      gap: 4px;
      align-items: flex-end;
    }

    .mood-dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .mood-dot {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 4px;
      min-width: 10px;
      cursor: default;
    }

    .mood-dot-day {
      font-size: 0.65rem;
      color: #ccc;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>To-Do</h1>
      <div class="tab-bar">
        <button class="tab active" id="tab-today-btn"   onclick="switchTab('today')">Today</button>
        <button class="tab"        id="tab-history-btn" onclick="switchTab('history')">History</button>
        <button class="tab"        id="tab-learn-btn"   onclick="switchTab('learn')">Learn</button>
      </div>
    </div>

    <!-- TODAY -->
    <div id="panel-today">
      <div id="quote-section"></div>
      <div id="focus-section"></div>
      <div class="add-bar">
        <div class="add-main">
          <input class="headline-input" id="new-todo" type="text" placeholder="Add a task…" autocomplete="off" />
          <button class="details-toggle" id="details-toggle" onclick="toggleDetails()">+ details</button>
          <button class="add-btn" onclick="addTodo()">Add</button>
        </div>
        <div class="add-details" id="add-details">
          <div>
            <span class="field-label">Priority</span>
            <select id="new-priority">
              <option value="medium">Medium</option>
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div>
            <span class="field-label">Due date</span>
            <input type="date" id="new-due" />
          </div>
          <div>
            <span class="field-label">Category</span>
            <input type="text" id="new-category" placeholder="e.g. Work, Learning…" />
          </div>
          <div class="full">
            <span class="field-label">Context / notes</span>
            <textarea id="new-context" placeholder="Any extra detail…"></textarea>
          </div>
        </div>
      </div>

      <ul class="task-list" id="active-list"></ul>

      <hr class="section-divider" />

      <div class="section-header">
        <span class="section-label">Recurring</span>
        <button class="sm-btn" onclick="toggleAddRec()">+ Add</button>
      </div>

      <div class="add-rec-form" id="add-rec-form">
        <div class="add-main">
          <input class="headline-input" id="new-rec-text" type="text" placeholder="Task name…" autocomplete="off" />
        </div>
        <div class="two-col">
          <div><span class="field-label">Snooze until</span><input type="date" id="new-rec-snooze" /></div>
          <div><span class="field-label">Must do by</span><input type="date" id="new-rec-mustdo" /></div>
        </div>
        <div class="form-actions">
          <button class="cancel-btn" onclick="toggleAddRec()">Cancel</button>
          <button class="save-btn" onclick="addRecurring()">Add</button>
        </div>
      </div>

      <ul class="rec-list" id="recurring-list"></ul>

      <hr class="section-divider" />

      <div class="section-header">
        <span class="section-label">Wrap up today</span>
      </div>

      <p class="completed-count-msg" id="completed-count-msg"></p>

      <div class="mood-row">
        <button class="mood-btn" data-mood="Crushed it"  onclick="selectMood(this)">Crushed it</button>
        <button class="mood-btn" data-mood="Solid day"   onclick="selectMood(this)">Solid day</button>
        <button class="mood-btn" data-mood="Mixed bag"   onclick="selectMood(this)">Mixed bag</button>
        <button class="mood-btn" data-mood="Fell behind" onclick="selectMood(this)">Fell behind</button>
        <button class="mood-btn" data-mood="Rough one"   onclick="selectMood(this)">Rough one</button>
      </div>

      <textarea id="recap-input" placeholder="Anything worth noting about today…"></textarea>

      <div class="form-actions">
        <button class="save-btn" id="wrapup-save-btn" onclick="saveWrapup()">Save</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="panel-history" style="display:none">
      <div id="history-content"></div>
    </div>

    <!-- LEARN -->
    <div id="panel-learn" style="display:none">
      <div class="learn-topbar">
        <span class="section-label">Knowledge &amp; Learning</span>
        <div class="learn-filters">
          <button class="sm-btn" id="show-mastered-btn" onclick="toggleShowMastered()">Show mastered</button>
          <button class="sm-btn" onclick="toggleAddTopic()">+ Add topic</button>
        </div>
      </div>

      <div class="add-topic-form" id="add-topic-form">
        <span class="field-label" style="margin-bottom:8px;display:block;">New topic</span>
        <input type="text" id="new-topic-title" placeholder="Topic name…" autocomplete="off" />
        <textarea id="new-topic-desc" placeholder="Context or description (optional)…"></textarea>
        <textarea id="new-topic-note" placeholder="First note (optional)…"></textarea>
        <div class="form-actions">
          <button class="cancel-btn" onclick="toggleAddTopic()">Cancel</button>
          <button class="save-btn" onclick="addTopic()">Add</button>
        </div>
      </div>

      <div id="learn-list"></div>
    </div>
  </div>

  <script>
    const KEY = 'andie-todos-v2';
    let selectedMood  = null;
    let showMastered  = false;
    let editingId     = null;
    let editingFocus  = false;

    const MOOD_CLASS = {
      'Crushed it': 'mood-crushed',
      'Solid day':  'mood-solid',
      'Mixed bag':  'mood-mixed',
      'Fell behind':'mood-behind',
      'Rough one':  'mood-rough',
    };

    // ── Storage ─────────────────────────────────────────

    function load() {
      try {
        const d = JSON.parse(localStorage.getItem(KEY));
        if (d && Array.isArray(d.todos)) {
          if (!d.log)     d.log = [];
          if (!d.learn)   d.learn = [];
          if (!d.focuses) d.focuses = [];
          return d;
        }
      } catch {}
      return { todos: [], recurring: [], log: [], learn: [] };
    }

    function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

    function today() { return new Date().toISOString().slice(0, 10); }

    function addDays(n, from) {
      const d = new Date((from || today()) + 'T00:00:00');
      d.setDate(d.getDate() + n);
      return d.toISOString().slice(0, 10);
    }

    function fmt(s) {
      if (!s) return '';
      return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtRelative(s) {
      if (!s) return '';
      const t = today();
      if (s === t) return 'Today';
      const diff = Math.round((new Date(t + 'T00:00:00') - new Date(s + 'T00:00:00')) / 86400000);
      if (diff === 1) return 'Yesterday';
      if (diff < 7)  return diff + 'd ago';
      return fmt(s);
    }

    function fmtDue(s) {
      if (!s) return null;
      const t = today();
      if (s < t) return { label: 'Overdue', cls: 'overdue' };
      if (s === t) return { label: 'Today', cls: 'today' };
      const d = new Date(s + 'T00:00:00');
      const diff = Math.round((d - new Date(t + 'T00:00:00')) / 86400000);
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      if (diff === 1) return { label: 'Tomorrow', cls: '' };
      if (diff <= 6) return { label: days[d.getDay()], cls: '' };
      return { label: fmt(s), cls: '' };
    }

    function isActive(r) { return !r.snoozeUntil || r.snoozeUntil <= today(); }
    function isDue(r)    { return r.mustDoBy && r.mustDoBy <= today(); }
    function isSoon(r)   { return r.mustDoBy && r.mustDoBy > today() && addDays(3) >= r.mustDoBy; }

    // ── Tab switching ────────────────────────────────────

    function switchTab(tab) {
      ['today','history','learn'].forEach(t => {
        document.getElementById('panel-' + t).style.display = t === tab ? '' : 'none';
        document.getElementById('tab-' + t + '-btn').classList.toggle('active', t === tab);
      });
      if (tab === 'history') renderHistory();
      if (tab === 'learn')   renderLearn();
    }

    // ── Render ───────────────────────────────────────────

    function render() {
      renderFocus();
      renderActive();
      renderRecurringList();
      renderWrapup();
    }

    function renderActive() {
      const { todos, recurring } = load();
      const list = document.getElementById('active-list');
      list.innerHTML = '';

      const activeTodos = todos.filter(t => !t.done);
      const PSCORE = { urgent: 0, high: 1, medium: 2, low: 3 };
      activeTodos.sort((a, b) => {
        const t = today();
        const aOD = a.due && a.due < t ? 1 : 0;
        const bOD = b.due && b.due < t ? 1 : 0;
        if (aOD !== bOD) return bOD - aOD;
        const pDiff = (PSCORE[a.priority] ?? 2) - (PSCORE[b.priority] ?? 2);
        if (pDiff !== 0) return pDiff;
        if (a.due && b.due) return a.due < b.due ? -1 : 1;
        if (a.due) return -1;
        if (b.due) return 1;
        return 0;
      });

      const activeRec = recurring.filter(isActive);
      activeRec.sort((a, b) => {
        const aD = isDue(a) ? 2 : isSoon(a) ? 1 : 0;
        const bD = isDue(b) ? 2 : isSoon(b) ? 1 : 0;
        return bD - aD;
      });

      if (!activeTodos.length && !activeRec.length) {
        const msg = document.createElement('p');
        msg.className = 'empty-msg';
        msg.textContent = 'Nothing here yet.';
        list.appendChild(msg);
        return;
      }

      activeTodos.forEach(t => list.appendChild(makeTodoItem(t)));
      activeRec.forEach(r   => list.appendChild(makeRecItem(r)));
    }

    function renderRecurringList() {
      const { recurring } = load();
      const list = document.getElementById('recurring-list');
      list.innerHTML = '';

      if (!recurring.length) {
        const msg = document.createElement('p');
        msg.className = 'empty-msg';
        msg.textContent = 'No recurring tasks yet.';
        list.appendChild(msg);
        return;
      }

      recurring.forEach(r => list.appendChild(makeTemplateItem(r)));
    }

    function renderWrapup() {
      const data = load();
      const entry = data.log.find(e => e.date === today());
      const count = entry?.completed?.length || 0;

      document.getElementById('completed-count-msg').textContent =
        count === 0 ? 'No tasks completed yet today.' :
        `${count} task${count !== 1 ? 's' : ''} completed today.`;

      if (entry?.mood) {
        selectedMood = entry.mood;
        document.querySelectorAll('.mood-btn').forEach(b =>
          b.classList.toggle('selected', b.dataset.mood === entry.mood));
      }

      if (entry?.recap && !document.getElementById('recap-input').value) {
        document.getElementById('recap-input').value = entry.recap;
      }
    }

    function renderHistory() {
      const data = load();
      const container = document.getElementById('history-content');
      container.innerHTML = '';

      const log = data.log.slice().reverse();

      container.appendChild(makeMoodTrend(data));

      if (!log.length) {
        const msg = document.createElement('p');
        msg.className = 'empty-msg';
        msg.textContent = 'No history yet. Save your first daily wrap-up to start tracking.';
        container.appendChild(msg);
        return;
      }

      log.forEach(entry => container.appendChild(makeLogEntry(entry)));
    }

    function makeMoodTrend(data) {
      const MOOD_COLOR = {
        'Crushed it': '#7bbf7b',
        'Solid day':  '#6ba8d4',
        'Mixed bag':  '#d4b06a',
        'Fell behind':'#d4906a',
        'Rough one':  '#d47a7a',
      };

      const moodMap = {};
      data.log.forEach(e => { if (e.mood) moodMap[e.date] = e.mood; });

      const card = document.createElement('div');
      card.className = 'mood-trend-card';

      const lbl = document.createElement('div');
      lbl.className = 'trend-label';
      lbl.textContent = 'Mood — last 14 days';
      card.appendChild(lbl);

      const dots = document.createElement('div');
      dots.className = 'mood-dots';

      for (let i = 13; i >= 0; i--) {
        const date = addDays(-i);
        const mood = moodMap[date];
        const dayName = ['S','M','T','W','T','F','S'][new Date(date + 'T00:00:00').getDay()];

        const col = document.createElement('div');
        col.className = 'mood-dot-col';

        const dot = document.createElement('div');
        dot.className = 'mood-dot';
        dot.style.background = mood ? (MOOD_COLOR[mood] || '#e8e5e0') : '#e8e5e0';
        dot.title = mood ? `${fmt(date)}: ${mood}` : fmt(date);

        const dl = document.createElement('div');
        dl.className = 'mood-dot-day';
        dl.textContent = dayName;

        col.append(dot, dl);
        dots.appendChild(col);
      }

      card.appendChild(dots);
      return card;
    }

    function renderLearn() {
      const data = load();
      const container = document.getElementById('learn-list');
      container.innerHTML = '';

      let topics = data.learn;
      if (!showMastered) topics = topics.filter(t => t.status !== 'mastered');

      const active   = topics.filter(t => t.status !== 'mastered')
                              .sort((a,b) => (b.lastTouched||'') > (a.lastTouched||'') ? 1 : -1);
      const mastered = topics.filter(t => t.status === 'mastered')
                              .sort((a,b) => (b.lastTouched||'') > (a.lastTouched||'') ? 1 : -1);

      if (!active.length && !mastered.length) {
        const msg = document.createElement('p');
        msg.className = 'empty-msg';
        msg.textContent = 'No topics yet. Add one to start tracking your learning.';
        container.appendChild(msg);
        return;
      }

      active.forEach(t   => container.appendChild(makeTopicCard(t)));
      mastered.forEach(t => container.appendChild(makeTopicCard(t)));
    }

    // ── Item builders ────────────────────────────────────

    function makeTodoItem(todo) {
      if (editingId === todo.id) return makeEditItem(todo);

      const li = document.createElement('li');
      li.className = 'task-item';

      const main = document.createElement('div');
      main.className = 'task-main';
      main.onclick = () => li.classList.toggle('expanded');

      const check = document.createElement('button');
      check.className = 'check-btn';
      check.title = 'Mark complete';
      check.onclick = e => { e.stopPropagation(); completeTodo(todo.id); };

      const dot = document.createElement('span');
      dot.className = 'priority-dot';
      dot.dataset.p = todo.priority || 'medium';

      const text = document.createElement('span');
      text.className = 'task-text';
      text.textContent = todo.text;

      main.append(check, dot, text);

      if (todo.due) {
        const due = fmtDue(todo.due);
        if (due) {
          const chip = document.createElement('span');
          chip.className = 'due-chip' + (due.cls ? ' ' + due.cls : '');
          chip.textContent = due.label;
          main.append(chip);
        }
      }

      const chevron = document.createElement('span');
      chevron.className = 'chevron';
      chevron.textContent = '›';
      main.append(chevron);

      const detail = document.createElement('div');
      detail.className = 'task-detail';
      const hr = document.createElement('hr');
      hr.className = 'detail-divider';
      detail.append(hr);

      const rows = [];
      if (todo.priority) rows.push(['Priority', todo.priority[0].toUpperCase() + todo.priority.slice(1)]);
      if (todo.due)      rows.push(['Due', fmt(todo.due)]);
      if (todo.category) rows.push(['Category', todo.category]);
      if (todo.context)  rows.push(['Context', todo.context]);

      rows.forEach(([label, value]) => {
        const row = document.createElement('div');
        row.className = 'detail-row';
        row.innerHTML = `<span class="d-label">${label}</span><span class="d-value">${value}</span>`;
        detail.append(row);
      });

      const actions = document.createElement('div');
      actions.className = 'task-actions';

      const edit = document.createElement('button');
      edit.className = 'sm-btn';
      edit.textContent = 'Edit';
      edit.onclick = () => { editingId = todo.id; renderActive(); };

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = 'Delete';
      del.onclick = () => deleteTodo(todo.id);

      actions.append(edit, del);
      detail.append(actions);

      li.append(main, detail);
      return li;
    }

    function makeRecItem(r) {
      const li = document.createElement('li');
      li.className = 'rec-item';

      const main = document.createElement('div');
      main.className = 'rec-main';

      const circle = document.createElement('div');
      circle.className = 'rec-circle';
      circle.title = 'Mark done…';
      circle.onclick = () => form.classList.toggle('open');

      const text = document.createElement('span');
      text.className = 'task-text';
      text.textContent = r.text;

      const icon = document.createElement('span');
      icon.className = 'rec-icon';
      icon.textContent = '↻';

      main.append(circle, text, icon);

      if (isDue(r)) {
        const tag = document.createElement('span');
        tag.className = 'tag tag-due';
        tag.textContent = 'due ' + fmt(r.mustDoBy);
        main.append(tag);
      } else if (isSoon(r)) {
        const tag = document.createElement('span');
        tag.className = 'tag tag-soon';
        tag.textContent = 'by ' + fmt(r.mustDoBy);
        main.append(tag);
      }

      const form = makeCompleteForm(r.id);
      li.append(main, form);
      return li;
    }

    function makeCompleteForm(id) {
      const div = document.createElement('div');
      div.className = 'rec-complete-form';
      const t = today();
      div.innerHTML = `
        <div class="cf-grid">
          <div><span class="field-label">Completed on</span><input type="date" id="cf-done-${id}" value="${t}" max="${t}" /></div>
          <div><span class="field-label">Snooze until</span><input type="date" id="cf-snooze-${id}" value="${addDays(7)}" /></div>
          <div><span class="field-label">Must do by</span><input type="date" id="cf-mustdo-${id}" value="${addDays(10)}" /></div>
        </div>
        <div class="form-actions">
          <button class="cancel-btn" onclick="this.closest('.rec-complete-form').classList.remove('open')">Cancel</button>
          <button class="save-btn" onclick="saveCompletion(${id})">Save</button>
        </div>`;
      return div;
    }

    function makeTemplateItem(r) {
      const li = document.createElement('li');
      li.className = 'template-item';

      const dot = document.createElement('span');
      dot.className = 'rec-dot ' + (isDue(r) ? 'dot-due' : isActive(r) ? 'dot-active' : 'dot-snoozed');

      const text = document.createElement('span');
      text.className = 't-text';
      text.textContent = r.text;

      const meta = document.createElement('span');
      meta.className = 't-meta';
      if (isDue(r)) {
        meta.innerHTML = `<span class="m-due">due ${fmt(r.mustDoBy)}</span>`;
      } else if (isActive(r)) {
        meta.innerHTML = `<span class="m-active">active</span>` + (r.mustDoBy ? ` · by ${fmt(r.mustDoBy)}` : '');
      } else {
        meta.textContent = `back ${fmt(r.snoozeUntil)}` + (r.mustDoBy ? ` · by ${fmt(r.mustDoBy)}` : '');
      }

      const del = document.createElement('button');
      del.className = 'x-btn';
      del.textContent = '×';
      del.onclick = () => removeRecurring(r.id);

      li.append(dot, text, meta, del);
      return li;
    }

    function makeTopicCard(topic) {
      const card = document.createElement('div');
      card.className = 'topic-card' + (topic.status === 'mastered' ? ' mastered' : '');
      card.dataset.id = topic.id;

      // Header
      const header = document.createElement('div');
      header.className = 'topic-header';
      header.onclick = () => {
        card.classList.toggle('expanded');
        if (card.classList.contains('expanded')) renderTopicBody(topic.id, card);
      };

      const dot = document.createElement('span');
      dot.className = 'topic-dot ' + (topic.status === 'mastered' ? 'mastered' : 'active');

      const title = document.createElement('span');
      title.className = 'topic-title';
      title.textContent = topic.title;

      const touched = document.createElement('span');
      touched.className = 'topic-touched';
      touched.textContent = topic.lastTouched ? fmtRelative(topic.lastTouched) : 'Never';

      const chevron = document.createElement('span');
      chevron.className = 'topic-chevron';
      chevron.textContent = '›';

      header.append(dot, title, touched, chevron);

      // Body placeholder (filled on expand)
      const body = document.createElement('div');
      body.className = 'topic-body';

      card.append(header, body);
      return card;
    }

    function renderTopicBody(id, card) {
      const data = load();
      const topic = data.learn.find(t => t.id === id);
      if (!topic) return;

      const body = card.querySelector('.topic-body');
      body.innerHTML = '';

      // Description
      if (topic.description) {
        const desc = document.createElement('p');
        desc.className = 'topic-desc';
        desc.textContent = topic.description;
        body.appendChild(desc);
      }

      // Notes section
      const notesSection = document.createElement('div');
      notesSection.className = 'learn-section';

      const notesHeader = document.createElement('div');
      notesHeader.className = 'learn-section-header';
      notesHeader.innerHTML = `<span class="learn-section-label">Notes</span>`;
      const addNoteBtn = document.createElement('button');
      addNoteBtn.className = 'sm-btn';
      addNoteBtn.textContent = '+ Add';
      addNoteBtn.onclick = () => noteForm.classList.toggle('open');
      notesHeader.appendChild(addNoteBtn);
      notesSection.appendChild(notesHeader);

      const noteForm = document.createElement('div');
      noteForm.className = 'add-note-form';
      noteForm.innerHTML = `
        <textarea id="note-input-${id}" placeholder="What did you learn or do?"></textarea>
        <div class="form-actions">
          <button class="cancel-btn" onclick="this.closest('.add-note-form').classList.remove('open')">Cancel</button>
          <button class="save-btn" onclick="addNote(${id})">Add note</button>
        </div>`;
      notesSection.appendChild(noteForm);

      const notes = (topic.notes || []).slice().reverse();
      if (notes.length) {
        notes.forEach(note => {
          const item = document.createElement('div');
          item.className = 'note-item';
          item.innerHTML = `
            <span class="note-date">${fmt(note.date)}</span>

    function makeLogEntry(entry) {
      const div = document.createElement('div');
      div.className = 'log-entry';

      const header = document.createElement('div');
      header.className = 'log-header';

      const date = document.createElement('span');
      date.className = 'log-date';
      date.textContent = new Date(entry.date + 'T00:00:00').toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric'
      });
      header.appendChild(date);

      if (entry.mood) {
        const mood = document.createElement('span');
        mood.className = 'log-mood ' + (MOOD_CLASS[entry.mood] || '');
        mood.textContent = entry.mood;
        header.appendChild(mood);
      }

      div.appendChild(header);

      if (entry.recap) {
        const recap = document.createElement('p');
        recap.className = 'log-recap';
        recap.textContent = entry.recap;
        div.appendChild(recap);
      }

      if (entry.completed?.length) {
        const tasks = document.createElement('div');
        tasks.className = 'log-tasks';
        entry.completed.forEach(t => {
          const task = document.createElement('span');
          task.className = 'log-task';
          task.textContent = t.text;
          tasks.appendChild(task);
        });
        div.appendChild(tasks);
      } else if (!entry.recap) {
        const none = document.createElement('span');
        none.className = 'log-no-tasks';
        none.textContent = 'No tasks logged.';
        div.appendChild(none);
      }

      return div;
    }

    // ── Focus ────────────────────────────────────────────

    function renderFocus() {
      const sec = document.getElementById('focus-section');
      if (!sec) return;
      sec.innerHTML = '';

      const data = load();
      const todayFocus = data.focuses.find(f => f.date === today());

      const card = document.createElement('div');
      card.className = 'focus-card';

      const heading = document.createElement('div');
      heading.className = 'focus-heading';
      heading.textContent = "Today's priorities";
      card.appendChild(heading);

      if (todayFocus && !editingFocus) {
        const list = document.createElement('div');
        list.className = 'focus-set-items';
        todayFocus.items.filter(x => x).forEach((item, i) => {
          const row = document.createElement('div');
          row.className = 'focus-item';
          row.innerHTML = `<span class="focus-num">${i + 1}</span><span>${escHtml(item)}</span>`;
          list.appendChild(row);
        });
        card.appendChild(list);

        const editBtn = document.createElement('button');
        editBtn.className = 'focus-edit-link';
        editBtn.textContent = 'Edit priorities';
        editBtn.onclick = () => { editingFocus = true; renderFocus(); };
        card.appendChild(editBtn);
      } else {
        const q = document.createElement('p');
        q.className = 'focus-question';
        q.textContent = 'What are your top 3 priorities today?';
        card.appendChild(q);

        const inputs = document.createElement('div');
        inputs.className = 'focus-inputs';
        const existing = todayFocus?.items || ['', '', ''];
        for (let i = 0; i < 3; i++) {
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.id = `focus-inp-${i}`;
          inp.placeholder = `Priority ${i + 1}…`;
          inp.value = existing[i] || '';
          inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveFocus(); });
          inputs.appendChild(inp);
        }
        card.appendChild(inputs);

        const actions = document.createElement('div');
        actions.className = 'form-actions';
        if (todayFocus) {
          const cancel = document.createElement('button');
          cancel.className = 'cancel-btn';
          cancel.textContent = 'Cancel';
          cancel.onclick = () => { editingFocus = false; renderFocus(); };
          actions.appendChild(cancel);
        }
        const saveBtn = document.createElement('button');
        saveBtn.className = 'save-btn';
        saveBtn.textContent = 'Set priorities';
        saveBtn.onclick = saveFocus;
        actions.appendChild(saveBtn);
        card.appendChild(actions);
      }

      sec.appendChild(card);
    }

    function saveFocus() {
      const items = [0, 1, 2].map(i => document.getElementById(`focus-inp-${i}`)?.value.trim() || '');
      if (!items.some(x => x)) return;
      const data = load();
      const idx = data.focuses.findIndex(f => f.date === today());
      const entry = { date: today(), items };
      if (idx >= 0) data.focuses[idx] = entry;
      else data.focuses.push(entry);
      save(data);
      editingFocus = false;
      renderFocus();
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escAttr(s) { return escHtml(s); }

    function extractTitle(text) {
      return text.split(' – ')[0].split(' (')[0].trim();
    }

    // ── Seed & migrate ───────────────────────────────────

    const KNOWLEDGE_GAP_PATTERNS = ['GitHub','DBT','AI infrastructure','Ops OS literacy','Claude managed agents','Command center in Claude Code'];

    function seedAndMigrate() {
      const data = load();
      const now = Date.now();

      // Seed one-off todos
      if (!data.seeded) {
        [
          'Wed EOD (hard): VIP Slack workflow – solo brainstorm + build + test',
          'End of week: Mima – net zero + daily evals',
          'End of week: Coach – daily evals',
          'End of week: Darrell Younger hypothesis-check with Coco',
        ].forEach((text, i) => data.todos.push({ id: now + i, text, done: false, priority: 'medium', due: null, category: null, context: null }));
        data.seeded = true;
      }

      // Migrate knowledge gaps from recurring → learn
      if (!data.learnSeeded) {
        if (!data.learn) data.learn = [];

        const toMigrate = [];
        data.recurring = data.recurring.filter(r => {
          const isGap = KNOWLEDGE_GAP_PATTERNS.some(p => r.text.startsWith(p));
          if (isGap) toMigrate.push(r);
          return !isGap;
        });

        toMigrate.forEach((r, i) => {
          data.learn.push({
            id: now + 200 + i,
            title: extractTitle(r.text),
            description: r.text,
            status: 'active',
            resources: [],
            notes: [],
            lastTouched: null,
            createdAt: today(),
          });
        });

        // Seed learn topics if none were migrated
        if (!toMigrate.length && !data.learn.length) {
          [
            ['GitHub', 'Primer → Q&A conversation → quiz (concepts, workflows, spot gaps, eventually contribute to structure)'],
            ['DBT & DBT modeling', 'Same learning arc as GitHub (prove you can hang with analytical engineering without becoming one)'],
            ['AI infrastructure & service account value prop', 'Where things are hosted, strands, local vs shared, how GitHub fits in, why Snowflake service account matters'],
            ['Ops OS literacy', "Matt Hardy & Annie's build — understand the operational OS being built"],
            ['Claude managed agents & Claude tag', 'How Claude managed agents work and what the Claude tag means in practice'],
            ['Command center in Claude Code', 'Building and refining this personal command center with Claude Code'],
          ].forEach(([title, description], i) => {
            data.learn.push({ id: now + 300 + i, title, description, status: 'active', resources: [], notes: [], lastTouched: null, createdAt: today() });
          });
        }

        data.learnSeeded = true;
      }

      save(data);
    }

    function renderQuote() {
      const sec = document.getElementById('quote-section');
      if (!sec) return;
      const d = new Date();
      const start = new Date(d.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((d - start) / 86400000);
      const { q, a } = QUOTES[dayOfYear % QUOTES.length];
      sec.innerHTML = `<div class="quote-card"><p class="quote-text">“${escHtml(q)}”</p><p class="quote-attr">— ${escHtml(a)}</p></div>`;
    }

    // ── Init ────────────────────────────────────────────

    document.getElementById('new-todo').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
    document.getElementById('new-rec-text').addEventListener('keydown', e => { if (e.key === 'Enter') addRecurring(); });
    document.getElementById('new-topic-title').addEventListener('keydown', e => { if (e.key === 'Enter') addTopic(); });

    seedAndMigrate();
    renderQuote();
    render();
