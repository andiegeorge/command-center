<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andie's To-Dos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      color: #aaa;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]::placeholder { color: #555; }
    input[type="text"]:focus { border-color: #555; }

    button.add-btn {
      background: #e8e8e8;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: #fff; }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid #1e1e1e;
    }

    li:last-child { border-bottom: none; }

    .checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid #3a3a3a;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .checkbox:hover { border-color: #888; }

    .checkbox.checked {
      background: #3a3a3a;
      border-color: #3a3a3a;
    }

    .checkbox.checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 1.5px solid #aaa;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      cursor: default;
    }

    .todo-text.done {
      color: #444;
      text-decoration: line-through;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #2e2e2e;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    li:hover .delete-btn { color: #666; }
    .delete-btn:hover { color: #e55 !important; }

    .completed-section { margin-top: 28px; }

    .empty {
      color: #333;
      font-size: 0.9rem;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do</h1>

    <div class="input-row">
      <input type="text" id="new-todo" placeholder="Add a task…" autocomplete="off" />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <div id="active-section">
      <ul id="active-list"></ul>
    </div>

    <div class="completed-section" id="completed-section" style="display:none">
      <div class="section-label">Completed</div>
      <ul id="completed-list"></ul>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'andie-todos';

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(todos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function render() {
      const todos = load();
      const active = todos.filter(t => !t.done);
      const done = todos.filter(t => t.done);

      const activeList = document.getElementById('active-list');
      const completedList = document.getElementById('completed-list');
      const completedSection = document.getElementById('completed-section');

      activeList.innerHTML = '';
      completedList.innerHTML = '';

      if (active.length === 0) {
        activeList.innerHTML = '<li><span class="empty">Nothing here yet.</span></li>';
      } else {
        active.forEach(t => activeList.appendChild(makeItem(t)));
      }

      if (done.length > 0) {
        completedSection.style.display = '';
        done.forEach(t => completedList.appendChild(makeItem(t)));
      } else {
        completedSection.style.display = 'none';
      }
    }

    function makeItem(todo) {
      const li = document.createElement('li');

      const box = document.createElement('div');
      box.className = 'checkbox' + (todo.done ? ' checked' : '');
      box.onclick = () => toggle(todo.id);

      const text = document.createElement('span');
      text.className = 'todo-text' + (todo.done ? ' done' : '');
      text.textContent = todo.text;

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '×';
      del.title = 'Delete';
      del.onclick = () => remove(todo.id);

      li.append(box, text, del);
      return li;
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      const todos = load();
      todos.unshift({ id: Date.now(), text, done: false });
      save(todos);
      input.value = '';
      render();
    }

    function toggle(id) {
      const todos = load();
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save(todos);
      render();
    }

    function remove(id) {
      save(load().filter(t => t.id !== id));
      render();
    }

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
